<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoCore | Dark Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div id="mainMenu" class="menu">
            <h2>CryptoCore</h2>
            <button onclick="show('gen')">🔑 Key generieren</button>
            <button onclick="show('enc')">🔒 Verschlüsseln</button>
            <button onclick="show('dec')">🔓 Entschlüsseln</button>
        </div>

        <div id="gen" class="hidden section-content">
            <h2>Generator</h2>
            <button id="doGen">Neuen Key erzeugen</button>
            <div class="label">Dein Key</div>
            <textarea id="outKey" rows="3" readonly></textarea>
            <button class="btn-back" onclick="show('mainMenu')">Zurück</button>
        </div>

        <div id="enc" class="hidden section-content">
            <h2>Encrypt</h2>
            <input type="text" id="inKeyEnc" placeholder="Key (Hex)">
            <input type="text" id="msgEnc" placeholder="Nachricht">
            <button id="doEnc">Verschlüsseln</button>
            <div class="label">Ergebnis</div>
            <textarea id="outEnc" rows="3" readonly></textarea>
            <button class="btn-back" onclick="show('mainMenu')">Zurück</button>
        </div>

        <div id="dec" class="hidden section-content">
            <h2>Decrypt</h2>
            <input type="text" id="inKeyDec" placeholder="Key (Hex)">
            <textarea id="msgDec" placeholder="Verschlüsselter Code" rows="3"></textarea>
            <button id="doDec">Entschlüsseln</button>
            <div class="label">Klartext</div>
            <textarea id="outDec" rows="2" readonly></textarea>
            <button class="btn-back" onclick="show('mainMenu')">Zurück</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
